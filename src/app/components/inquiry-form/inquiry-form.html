<div class="form-card">
  <h3>Quick Inquiry</h3>
  <p>Get a free, no-obligation quote today.</p>
  
  <form (submit)="onSubmit($event)">
    <div class="form-group">
      <input type="text" class="form-control" placeholder="Full Name" required>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <input type="tel" class="form-control" placeholder="Phone Number" required>
      </div>
      <div class="form-group">
        <input type="email" class="form-control" placeholder="Email Address" required>
      </div>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <select class="form-control" required>
          <option value="" disabled selected>Loan Type</option>
          <option value="first-home">First Home Buyer</option>
          <option value="refinance">Refinance</option>
          <option value="investment">Investment Loan</option>
          <option value="construction">Construction Loan</option>
        </select>
      </div>
      <div class="form-group">
        <input type="number" class="form-control" placeholder="Loan Amount ($)" required>
      </div>
    </div>
    
    <div class="form-group">
      <textarea class="form-control" rows="3" placeholder="Message (Optional)"></textarea>
    </div>
    
    <button type="submit" class="btn btn-primary btn-block">Get Your Free Quote</button>
  </form>
</div>
